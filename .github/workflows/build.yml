      - name: Silent-install, exercise, and uninstall the signed Setup
        shell: powershell
        run: >-
          ./scripts/windows-installed-release-smoke.ps1
          -SetupPath "release/Baby Diary Setup ${{ needs.release-context.outputs.version }}.exe"
