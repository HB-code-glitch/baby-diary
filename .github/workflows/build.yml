name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # electron-builder는 CI에서 자동 게시를 시도함(GH_TOKEN 필요) — 아티팩트 업로드만 쓰므로 게시 비활성화
      - run: npm run build:mac -- --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: baby-diary-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  e2e-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Launch the unpacked universal app, not the development Electron entrypoint.
      - run: npx electron-builder --mac --dir --universal --publish never
      # playwright electron support is built-in — no browser download required
      - run: npm run test:e2e
        env:
          BABYDIARY_E2E_EXECUTABLE: ${{ github.workspace }}/release/mac-universal/Baby Diary.app/Contents/MacOS/Baby Diary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  e2e-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Launch the unpacked x64 executable, not the development Electron entrypoint.
      - run: npx electron-builder --win --dir --x64 --publish never
      - run: npm run test:e2e
        env:
          BABYDIARY_E2E_EXECUTABLE: ${{ github.workspace }}/release/win-unpacked/Baby Diary.exe
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  release-win:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # NOTE: call electron-builder directly (not build:win) to skip the
      # PowerShell shortcut script which is not needed for CI publishing.
      - run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  release-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # 컴파일(dist + dist-electron) 없이 패키징하면 entry file 부재로 실패함
      - run: npm run build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      # 엄마용 쉬운 이름 사본 — 고정 링크(/releases/latest/download/INSTALL-ME-BabyDiary-Mac.dmg)용
      - run: |
          cp release/*universal.dmg INSTALL-ME-BabyDiary-Mac.dmg
          gh release upload "${GITHUB_REF_NAME}" INSTALL-ME-BabyDiary-Mac.dmg --repo HB-code-glitch/baby-diary-releases --clobber
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
