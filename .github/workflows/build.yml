  manifest-mac:
    needs: [release-context, package-mac, package-win, smoke-mac-arm64, smoke-mac-intel, smoke-win, upgrade-win, upgrade-mac-arm64, upgrade-mac-intel]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - name: Create the Mac manifest only after every install smoke passes
        run: >-
          node scripts/create-release-manifest.mjs --platform mac
          --source-dir release --staging-dir release-upload
          --manifest release-manifest/mac.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}"
          --version "${{ needs.release-context.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
      - uses: actions/upload-artifact@v4
        with:
          name: verified-release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/mac.json
          if-no-files-found: error
          retention-days: 1

  manifest-win:
    needs: [release-context, package-mac, package-win, smoke-mac-arm64, smoke-mac-intel, smoke-win, upgrade-win, upgrade-mac-arm64, upgrade-mac-intel]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
