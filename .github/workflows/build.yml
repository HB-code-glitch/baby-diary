          mkdir -p "${rules_root}"
          node scripts/upgrade-firestore-rules.mjs prepare --root "${rules_root}" --run-id "${run_id}" --candidate-source-sha "${{ github.sha }}"
          {
            echo "BABYDIARY_UPGRADE_RULES_ROOT=${rules_root}"
            echo "BABYDIARY_UPGRADE_RULES_RUN_ID=${run_id}"
          } >> "$GITHUB_ENV"
      - name: Run the signed Intel in-place upgrade gate inside one Auth/Firestore emulator process
        shell: bash
        run: |
          set -euo pipefail
          inner="bash ./scripts/mac-in-place-upgrade-smoke.sh --baseline-dmg upgrade-baseline-v0.3.8/Baby-Diary-0.3.8-universal.dmg --candidate-dmg \"${CANDIDATE_DMG_PATH}\" --expected-host-arch x86_64 --expected-team-id \"${MAC_EXPECTED_TEAM_ID}\" --candidate-source-sha ${{ github.sha }} --candidate-package-sha256 ${CANDIDATE_PACKAGE_SHA256} --candidate-provenance \"${CANDIDATE_PROVENANCE_PATH}\" --expected-repository ${{ github.repository }} --expected-workflow-run-id ${{ github.run_id }}"
          npx --no-install firebase-tools emulators:exec --project demo-baby-diary --only auth,firestore "${inner}"
        env:
          MAC_EXPECTED_TEAM_ID: ${{ secrets.MAC_EXPECTED_TEAM_ID }}
          BABYDIARY_UPGRADE_FIREBASE_EMULATOR: '1'
          BABYDIARY_UPGRADE_FIREBASE_PROJECT_ID: demo-baby-diary

  smoke-mac-arm64:
    needs: [release-context, package-mac]
    runs-on: macos-15
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
