name: Build

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # electron-builder auto-publishing is disabled; only workflow artifacts are produced here.
      - run: npm run build:mac -- --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: baby-diary-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  e2e-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm run build
      # Launch the unpacked universal app, not the development Electron entrypoint.
      - run: npx electron-builder --mac --dir --universal --publish never
      # Playwright Electron support is built in, so no browser download is required.
      - run: npm run test:e2e
        env:
          BABYDIARY_E2E_EXECUTABLE: ${{ github.workspace }}/release/mac-universal/Baby Diary.app/Contents/MacOS/Baby Diary
      - run: npm run test:e2e:sync
        timeout-minutes: 12
        env:
          BABYDIARY_SYNC_E2E_EXECUTABLE: ${{ github.workspace }}/release/mac-universal/Baby Diary.app/Contents/MacOS/Baby Diary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  e2e-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm run build
      # Launch the unpacked x64 executable, not the development Electron entrypoint.
      - run: npx electron-builder --win --dir --x64 --publish never
      - run: npm run test:e2e
        env:
          BABYDIARY_E2E_EXECUTABLE: ${{ github.workspace }}/release/win-unpacked/Baby Diary.exe
      - run: npm run test:e2e:sync
        timeout-minutes: 12
        env:
          BABYDIARY_SYNC_E2E_EXECUTABLE: ${{ github.workspace }}/release/win-unpacked/Baby Diary.exe
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  release-preflight:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - name: Verify release tag matches package version
        run: >-
          node -e "const { version } = require('./package.json');
          const expected = 'v' + version;
          const actual = process.env.GITHUB_REF_NAME;
          if (actual !== expected) {
          console.error('Release tag ' + actual + ' must equal ' + expected);
          process.exit(1) }"
      - name: Verify release upload target is absent or a private draft
        run: |
          set -euo pipefail
          mkdir -p .release-provenance
          remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq .sha)"
          if [ "${remote_sha}" != "${GITHUB_SHA}" ]; then
            echo "Source tag ${GITHUB_REF_NAME} moved from ${GITHUB_SHA} to ${remote_sha}" >&2
            exit 1
          fi
          gh api --paginate --slurp "repos/HB-code-glitch/baby-diary-releases/releases?per_page=100" \
            > .release-provenance/releases.json
          node scripts/validate-release-assets.mjs --pre-upload \
            --input .release-provenance/releases.json \
            --plan .release-provenance/plan.json \
            --notes .release-provenance/notes.txt \
            --source-repository "${GITHUB_REPOSITORY}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --version "$(node -p "require('./package.json').version")" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
          action="$(node -p "require('./.release-provenance/plan.json').action")"
          if [ "${action}" = create ]; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo HB-code-glitch/baby-diary-releases \
              --title "${GITHUB_REF_NAME}" \
              --draft \
              --notes-file .release-provenance/notes.txt
          elif [ "${action}" != resume ]; then
            echo "Unexpected release preparation action: ${action}" >&2
            exit 1
          fi
          gh api --paginate --slurp "repos/HB-code-glitch/baby-diary-releases/releases?per_page=100" \
            > .release-provenance/prepared-releases.json
          node scripts/validate-release-assets.mjs --pre-upload \
            --input .release-provenance/prepared-releases.json \
            --plan .release-provenance/prepared-plan.json \
            --notes .release-provenance/prepared-notes.txt \
            --source-repository "${GITHUB_REPOSITORY}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --version "$(node -p "require('./package.json').version")" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
          test "$(node -p "require('./.release-provenance/prepared-plan.json').action")" = resume
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  release-win:
    needs: [release-preflight, e2e-win, e2e-mac]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # Call electron-builder directly so the local shortcut helper is not run in CI.
      - run: npm run build && npx electron-builder --win --publish never
      - id: package-version
        name: Read package version
        shell: bash
        run: node -e "require('node:fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').version + '\n')"
      - name: Stage Windows assets and create the current-run manifest
        run: >-
          node scripts/create-release-manifest.mjs --platform windows
          --source-dir release --staging-dir release-upload
          --manifest release-manifest/windows.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ github.ref_name }}" --sha "${{ github.sha }}"
          --version "${{ steps.package-version.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
      - name: Upload the exact Windows staging set to the private draft
        shell: pwsh
        run: |
          $remoteSha = gh api "repos/${{ github.repository }}/commits/${{ github.ref_name }}" --jq .sha
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($remoteSha -ne "${{ github.sha }}") { throw "Source tag moved before Windows upload" }
          $files = @(Get-ChildItem -LiteralPath release-upload -File | ForEach-Object { $_.FullName })
          if ($files.Count -ne 4) { throw "Expected exactly 4 Windows release assets" }
          gh release upload "${{ github.ref_name }}" @files --repo HB-code-glitch/baby-diary-releases --clobber
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/windows.json
          if-no-files-found: error
          retention-days: 1

  release-mac:
    needs: [release-preflight, e2e-win, e2e-mac]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # Packaging must follow compilation so the Electron entry files exist.
      - run: npm run build && npx electron-builder --mac --publish never
      - id: package-version
        name: Read package version
        run: node -e "require('node:fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').version + '\n')"
      - name: Stage Mac assets and create the current-run manifest
        run: >-
          node scripts/create-release-manifest.mjs --platform mac
          --source-dir release --staging-dir release-upload
          --manifest release-manifest/mac.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ github.ref_name }}" --sha "${{ github.sha }}"
          --version "${{ steps.package-version.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
      - name: Upload the exact Mac staging set to the private draft
        run: |
          set -euo pipefail
          remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq .sha)"
          test "${remote_sha}" = "${GITHUB_SHA}"
          assets=(release-upload/*)
          test "${#assets[@]}" = 10
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --repo HB-code-glitch/baby-diary-releases --clobber
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/mac.json
          if-no-files-found: error
          retention-days: 1

  publish-release:
    needs: [build-mac, release-win, release-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifests
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifests
      - name: Verify the complete draft release
        run: |
          set -euo pipefail
          remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq .sha)"
          if [ "${remote_sha}" != "${GITHUB_SHA}" ]; then
            echo "Source tag moved before final publication" >&2
            exit 1
          fi
          mkdir verified-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo HB-code-glitch/baby-diary-releases \
            --dir verified-assets
          gh api --paginate --slurp "repos/HB-code-glitch/baby-diary-releases/releases?per_page=100" \
            > .release-api.json
          node scripts/validate-release-assets.mjs \
            --input .release-api.json \
            --manifests-dir release-manifests \
            --assets-dir verified-assets \
            --source-repository "${GITHUB_REPOSITORY}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --version "$(node -p "require('./package.json').version")" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Publish the verified draft once
        run: gh release edit "${GITHUB_REF_NAME}" --repo HB-code-glitch/baby-diary-releases --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
