name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # electron-builder는 CI에서 자동 게시를 시도함(GH_TOKEN 필요) — 아티팩트 업로드만 쓰므로 게시 비활성화
      - run: npm run build:mac -- --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: baby-diary-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  e2e-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # renderer + main only (no DMG/installer needed for E2E)
      - run: npm run build
      # playwright electron support is built-in — no browser download required
      - run: node scripts/mac-e2e.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  release-win:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # NOTE: call electron-builder directly (not build:win) to skip the
      # PowerShell shortcut script which is not needed for CI publishing.
      - run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  release-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # 컴파일(dist + dist-electron) 없이 패키징하면 entry file 부재로 실패함
      - run: npm run build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
