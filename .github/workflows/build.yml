  release-mac:
    needs:
      - security-check
      - release-context
      - release-preflight
      - e2e-mac
      - e2e-win
      - package-mac
      - package-win
      - upgrade-win
      - upgrade-mac-arm64
      - upgrade-mac-intel
      - smoke-mac-arm64
      - smoke-mac-intel
      - smoke-win
      - manifest-mac
    runs-on: ubuntu-latest
    environment: platform-release-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: verified-release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: verified-manifest
      - name: Recreate and compare the Mac manifest from the same signed package artifact
        run: |
          node scripts/create-release-manifest.mjs --platform mac \
            --source-dir release --staging-dir release-upload \
            --manifest release-manifest/mac.json \
            --source-repository "${{ github.repository }}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}" \
            --version "${{ needs.release-context.outputs.version }}" \
            --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
          node -e "const fs=require('node:fs'); const expected=fs.readFileSync(process.argv[1]); const actual=fs.readFileSync(process.argv[2]); if(Buffer.compare(expected,actual)!==0) throw new Error('Mac manifest changed between smoke and upload')" verified-manifest/mac.json release-manifest/mac.json
      - name: Revalidate and upload the exact Mac set by immutable release ID
        run: >-
          node scripts/upload-release-assets.mjs --platform mac
          --staging-dir release-upload --manifest release-manifest/mac.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}"
          --version "${{ needs.release-context.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/mac.json
          if-no-files-found: error
          retention-days: 1

