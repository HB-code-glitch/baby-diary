name: Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: baby-diary-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
