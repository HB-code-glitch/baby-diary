name: Build

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      signed_package_dry_run:
        description: Build, verify, install-smoke, and manifest signed packages without touching a GitHub release
        type: boolean
        required: false
        default: false

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      # This ordinary CI artifact is unsigned and is never consumed by the release jobs.
      - run: npm run build:mac -- --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: baby-diary-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  e2e-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm run build
      # Normal branch/PR E2E remains unsigned-capable.
      - run: npx electron-builder --mac --dir --universal --publish never
      - run: npm run test:e2e
        env:
          BABYDIARY_E2E_EXECUTABLE: ${{ github.workspace }}/release/mac-universal/Baby Diary.app/Contents/MacOS/Baby Diary
      - run: npm run test:e2e:sync
        timeout-minutes: 12
        env:
          BABYDIARY_SYNC_E2E_EXECUTABLE: ${{ github.workspace }}/release/mac-universal/Baby Diary.app/Contents/MacOS/Baby Diary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  e2e-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm run build
      # Normal branch/PR E2E remains unsigned-capable.
      - run: npx electron-builder --win --dir --x64 --publish never
      - run: npm run test:e2e
        env:
          BABYDIARY_E2E_EXECUTABLE: ${{ github.workspace }}/release/win-unpacked/Baby Diary.exe
      - run: npm run test:e2e:sync
        timeout-minutes: 12
        env:
          BABYDIARY_SYNC_E2E_EXECUTABLE: ${{ github.workspace }}/release/win-unpacked/Baby Diary.exe
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-e2e-screenshots
          path: |
            screenshots/
            e2e-result.json
          if-no-files-found: warn

  release-context:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    outputs:
      version: ${{ steps.context.outputs.version }}
      tag: ${{ steps.context.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
      - id: context
        name: Bind signed packaging to source version and tag
        shell: bash
        run: >-
          node -e "const fs=require('node:fs'); const {version}=require('./package.json');
          const isTag=process.env.GITHUB_REF.startsWith('refs/tags/v');
          const tag=isTag?process.env.GITHUB_REF_NAME:'v'+version;
          if(isTag&&tag!=='v'+version) throw new Error('Release tag '+tag+' must equal v'+version);
          fs.appendFileSync(process.env.GITHUB_OUTPUT,'version='+version+'\ntag='+tag+'\n')"

  release-preflight:
    needs: release-context
    runs-on: ubuntu-latest
    environment: platform-release-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - name: Verify release tag matches package version
        run: >-
          node -e "const { version } = require('./package.json');
          const expected = 'v' + version;
          const actual = process.env.GITHUB_REF_NAME;
          if (actual !== expected) {
          console.error('Release tag ' + actual + ' must equal ' + expected);
          process.exit(1) }"
      - name: Verify release upload target is absent or a private draft
        run: |
          set -euo pipefail
          mkdir -p .release-provenance
          remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}" --jq .sha)"
          if [ "${remote_sha}" != "${GITHUB_SHA}" ]; then
            echo "Source tag ${GITHUB_REF_NAME} moved from ${GITHUB_SHA} to ${remote_sha}" >&2
            exit 1
          fi
          gh api --paginate --slurp "repos/HB-code-glitch/baby-diary-releases/releases?per_page=100" \
            > .release-provenance/releases.json
          node scripts/validate-release-assets.mjs --pre-upload \
            --input .release-provenance/releases.json \
            --plan .release-provenance/plan.json \
            --notes .release-provenance/notes.txt \
            --source-repository "${GITHUB_REPOSITORY}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --version "${{ needs.release-context.outputs.version }}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
          action="$(node -p "require('./.release-provenance/plan.json').action")"
          if [ "${action}" = create ]; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo HB-code-glitch/baby-diary-releases \
              --title "${GITHUB_REF_NAME}" \
              --draft \
              --notes-file .release-provenance/notes.txt
          elif [ "${action}" != resume ]; then
            echo "Unexpected release preparation action: ${action}" >&2
            exit 1
          fi
          gh api --paginate --slurp "repos/HB-code-glitch/baby-diary-releases/releases?per_page=100" \
            > .release-provenance/prepared-releases.json
          node scripts/validate-release-assets.mjs --pre-upload \
            --input .release-provenance/prepared-releases.json \
            --plan .release-provenance/prepared-plan.json \
            --notes .release-provenance/prepared-notes.txt \
            --source-repository "${GITHUB_REPOSITORY}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${GITHUB_REF_NAME}" \
            --sha "${GITHUB_SHA}" \
            --version "${{ needs.release-context.outputs.version }}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"
          test "$(node -p "require('./.release-provenance/prepared-plan.json').action")" = resume
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  package-mac:
    needs: release-context
    runs-on: macos-15
    environment: platform-release-signing
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - name: Fail closed on missing Mac release credentials
        run: node scripts/platform-release-verification.mjs --platform mac --credentials-only
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          MAC_EXPECTED_TEAM_ID: ${{ secrets.MAC_EXPECTED_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Materialize App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          APPLE_API_KEY_PATH="${key_path}" node -e "const fs=require('node:fs'); const bytes=Buffer.from(process.env.APPLE_API_KEY_BASE64,'base64'); const text=bytes.toString('utf8'); if(!text.includes('BEGIN PRIVATE KEY')) throw new Error('APPLE_API_KEY must be a base64-encoded App Store Connect .p8 key'); fs.writeFileSync(process.env.APPLE_API_KEY_PATH,bytes,{mode:0o600})"
          echo "APPLE_API_KEY=${key_path}" >> "${GITHUB_ENV}"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      - name: Build signed and notarized Mac packages once
        run: npm run build && npx electron-builder --config electron-builder.release.cjs --mac --publish never
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Notarize and staple both final DMG containers
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(release/*.dmg)
          if [ "${#dmgs[@]}" -ne 2 ]; then
            echo "Expected exactly two Mac DMGs, found ${#dmgs[@]}" >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            xcrun notarytool submit "${dmg}" \
              --key "${APPLE_API_KEY}" \
              --key-id "${APPLE_API_KEY_ID}" \
              --issuer "${APPLE_API_ISSUER}" \
              --wait
            xcrun stapler staple "${dmg}"
          done
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - name: Rebuild update metadata from the final stapled DMG bytes
        run: >-
          node scripts/refresh-mac-update-metadata.mjs --release-dir release
          --version "${{ needs.release-context.outputs.version }}"
      - name: Hard-verify final signed Mac package bytes
        run: >-
          node scripts/platform-release-verification.mjs --platform mac
          --release-dir release --version "${{ needs.release-context.outputs.version }}"
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          MAC_EXPECTED_TEAM_ID: ${{ secrets.MAC_EXPECTED_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      - uses: actions/upload-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  package-win:
    needs: release-context
    runs-on: windows-latest
    environment: platform-release-signing
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - name: Fail closed on missing Windows release credentials
        run: node scripts/platform-release-verification.mjs --platform windows --credentials-only
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_EXPECTED_PUBLISHER: ${{ secrets.WIN_EXPECTED_PUBLISHER }}
      - name: Build signed Windows packages once
        run: npm run build && npx electron-builder --config electron-builder.release.cjs --win --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_EXPECTED_PUBLISHER: ${{ secrets.WIN_EXPECTED_PUBLISHER }}
      - name: Hard-verify final signed Windows package bytes
        run: >-
          node scripts/platform-release-verification.mjs --platform windows
          --release-dir release --version "${{ needs.release-context.outputs.version }}"
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_EXPECTED_PUBLISHER: ${{ secrets.WIN_EXPECTED_PUBLISHER }}
      - uses: actions/upload-artifact@v4
        with:
          name: signed-windows-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
            release/win-unpacked/**
          if-no-files-found: error
          retention-days: 1

  smoke-mac-arm64:
    needs: [release-context, package-mac]
    runs-on: macos-15
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - name: Install and exercise the universal DMG on Apple Silicon
        run: >-
          bash scripts/mac-installed-release-smoke.sh
          "release/Baby Diary-${{ needs.release-context.outputs.version }}-universal.dmg"
          arm64
        timeout-minutes: 20

  smoke-mac-intel:
    needs: [release-context, package-mac]
    runs-on: macos-15-intel
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - name: Install and exercise the universal DMG on Intel
        run: >-
          bash scripts/mac-installed-release-smoke.sh
          "release/Baby Diary-${{ needs.release-context.outputs.version }}-universal.dmg"
          x86_64
        timeout-minutes: 20

  smoke-win:
    needs: [release-context, package-win]
    runs-on: windows-latest
    environment: platform-release-signing
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-windows-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - name: Silent-install, exercise, and uninstall the signed Setup
        shell: powershell
        run: >-
          ./scripts/windows-installed-release-smoke.ps1
          -SetupPath "release/Baby Diary Setup ${{ needs.release-context.outputs.version }}.exe"
          -ExpectedPublisher "${env:WIN_EXPECTED_PUBLISHER}"
        timeout-minutes: 20
        env:
          WIN_EXPECTED_PUBLISHER: ${{ secrets.WIN_EXPECTED_PUBLISHER }}

  manifest-mac:
    needs: [release-context, package-mac, package-win, smoke-mac-arm64, smoke-mac-intel, smoke-win]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - name: Create the Mac manifest only after every install smoke passes
        run: >-
          node scripts/create-release-manifest.mjs --platform mac
          --source-dir release --staging-dir release-upload
          --manifest release-manifest/mac.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}"
          --version "${{ needs.release-context.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
      - uses: actions/upload-artifact@v4
        with:
          name: verified-release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/mac.json
          if-no-files-found: error
          retention-days: 1

  manifest-win:
    needs: [release-context, package-mac, package-win, smoke-mac-arm64, smoke-mac-intel, smoke-win]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.signed_package_dry_run == true)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-windows-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - name: Create the Windows manifest only after every install smoke passes
        run: >-
          node scripts/create-release-manifest.mjs --platform windows
          --source-dir release --staging-dir release-upload
          --manifest release-manifest/windows.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}"
          --version "${{ needs.release-context.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
      - uses: actions/upload-artifact@v4
        with:
          name: verified-release-manifest-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/windows.json
          if-no-files-found: error
          retention-days: 1

  release-mac:
    needs:
      - release-context
      - release-preflight
      - e2e-mac
      - e2e-win
      - package-mac
      - package-win
      - smoke-mac-arm64
      - smoke-mac-intel
      - smoke-win
      - manifest-mac
    runs-on: ubuntu-latest
    environment: platform-release-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-mac-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: verified-release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: verified-manifest
      - name: Recreate and compare the Mac manifest from the same signed package artifact
        run: |
          node scripts/create-release-manifest.mjs --platform mac \
            --source-dir release --staging-dir release-upload \
            --manifest release-manifest/mac.json \
            --source-repository "${{ github.repository }}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}" \
            --version "${{ needs.release-context.outputs.version }}" \
            --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
          node -e "const fs=require('node:fs'); const expected=fs.readFileSync(process.argv[1]); const actual=fs.readFileSync(process.argv[2]); if(Buffer.compare(expected,actual)!==0) throw new Error('Mac manifest changed between smoke and upload')" verified-manifest/mac.json release-manifest/mac.json
      - name: Revalidate and upload the exact Mac set by immutable release ID
        run: >-
          node scripts/upload-release-assets.mjs --platform mac
          --staging-dir release-upload --manifest release-manifest/mac.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}"
          --version "${{ needs.release-context.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/mac.json
          if-no-files-found: error
          retention-days: 1

  release-win:
    needs:
      - release-context
      - release-preflight
      - e2e-mac
      - e2e-win
      - package-mac
      - package-win
      - smoke-mac-arm64
      - smoke-mac-intel
      - smoke-win
      - manifest-win
    runs-on: ubuntu-latest
    environment: platform-release-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: signed-windows-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: verified-release-manifest-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: verified-manifest
      - name: Recreate and compare the Windows manifest from the same signed package artifact
        run: |
          node scripts/create-release-manifest.mjs --platform windows \
            --source-dir release --staging-dir release-upload \
            --manifest release-manifest/windows.json \
            --source-repository "${{ github.repository }}" \
            --release-repository "HB-code-glitch/baby-diary-releases" \
            --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}" \
            --version "${{ needs.release-context.outputs.version }}" \
            --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
          node -e "const fs=require('node:fs'); const expected=fs.readFileSync(process.argv[1]); const actual=fs.readFileSync(process.argv[2]); if(Buffer.compare(expected,actual)!==0) throw new Error('Windows manifest changed between smoke and upload')" verified-manifest/windows.json release-manifest/windows.json
      - name: Revalidate and upload the exact Windows set by immutable release ID
        run: >-
          node scripts/upload-release-assets.mjs --platform windows
          --staging-dir release-upload --manifest release-manifest/windows.json
          --source-repository "${{ github.repository }}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${{ needs.release-context.outputs.tag }}" --sha "${{ github.sha }}"
          --version "${{ needs.release-context.outputs.version }}"
          --run-id "${{ github.run_id }}" --run-attempt "${{ github.run_attempt }}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest/windows.json
          if-no-files-found: error
          retention-days: 1

  publish-release:
    needs: [build-mac, release-win, release-mac]
    runs-on: ubuntu-latest
    environment: platform-release-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest-windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifests
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest-mac-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifests
      - name: Validate, re-fetch, and publish the same immutable release once
        run: >-
          node scripts/publish-verified-release.mjs
          --manifests-dir release-manifests
          --source-repository "${GITHUB_REPOSITORY}"
          --release-repository "HB-code-glitch/baby-diary-releases"
          --tag "${GITHUB_REF_NAME}" --sha "${GITHUB_SHA}"
          --version "$(node -p "require('./package.json').version")"
          --run-id "${GITHUB_RUN_ID}" --run-attempt "${GITHUB_RUN_ATTEMPT}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
